<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" role="img" aria-labelledby="title desc">
  <title id="title">RSTS2 app icon</title>
  <desc id="desc">A stylized golden spire emblem on a dark ember medallion for the Slay the Spire 2 Run Randomizer.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3e1d13"/>
      <stop offset="55%" stop-color="#1a1418"/>
      <stop offset="100%" stop-color="#0a0b11"/>
    </linearGradient>
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffd98a"/>
      <stop offset="100%" stop-color="#b56a2e"/>
    </linearGradient>
    <linearGradient id="spire" x1="0" y1="0" x2="0.9" y2="1">
      <stop offset="0%" stop-color="#ffe9ad"/>
      <stop offset="45%" stop-color="#f3bf63"/>
      <stop offset="100%" stop-color="#d47434"/>
    </linearGradient>
    <radialGradient id="ember" cx="50%" cy="38%" r="52%">
      <stop offset="0%" stop-color="#ffb267" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#ffb267" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="256" height="256" rx="58" fill="url(#bg)"/>
  <rect x="10" y="10" width="236" height="236" rx="48" fill="none" stroke="url(#ring)" stroke-width="6"/>
  <circle cx="128" cy="120" r="88" fill="url(#ember)"/>

  <path d="M128 34 193 76 179 180 128 222 77 180 63 76Z" fill="#11151d" opacity="0.72"/>
  <path d="M128 44 183 80 171 172 128 206 85 172 73 80Z" fill="none" stroke="#6f4327" stroke-width="3" opacity="0.75"/>

  <g stroke="#8b512b" stroke-width="3" opacity="0.62">
    <path d="M128 44v162"/>
    <path d="M73 80h110"/>
    <path d="M85 172h86"/>
    <path d="M73 80 128 206 183 80"/>
    <path d="M128 44 85 172"/>
    <path d="M128 44 171 172"/>
  </g>

  <g filter="url(#glow)">
    <path d="M128 40 153 91 137 91 164 146 141 146 160 194 128 172 96 194 115 146 92 146 119 91 103 91Z" fill="url(#spire)"/>
    <path d="M128 60 143 92 132 92 151 128 135 128 147 157 128 145 109 157 121 128 105 128 124 92 113 92Z" fill="#fff1bf" opacity="0.38"/>
  </g>

  <path d="M128 58 150 101 137 101 159 141 141 141 154 171 128 156 102 171 115 141 97 141 119 101 106 101Z" fill="none" stroke="#fff2c8" stroke-width="3" opacity="0.78"/>

  <circle cx="128" cy="206" r="10" fill="#efc56a"/>
  <path d="M120 217h16" stroke="#f7df9a" stroke-width="3" stroke-linecap="round" opacity="0.8"/>
</svg>
